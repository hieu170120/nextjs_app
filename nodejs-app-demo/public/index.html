<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Công Việc</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Quản Lý Công Việc</h1>
            <p class="subtitle">Tổ chức công việc của bạn một cách hiệu quả</p>
        </header>

        <div class="add-todo-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Nhập công việc mới..."
                autocomplete="off"
            >
            <button id="addBtn" class="btn-add">Thêm</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalTodos">0</span>
                <span class="stat-label">Tổng công việc</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="completedTodos">0</span>
                <span class="stat-label">Đã hoàn thành</span>
            </div>
        </div>

        <div class="todos-container">
            <h2>Danh sách công việc</h2>
            <div id="todosList" class="todos-list">
                <div class="loading">Đang tải...</div>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
